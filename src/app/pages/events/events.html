

    <div class="content-wrapper">
      <h2>Dining Event Types</h2>
      <p class="intro-text">
        We provide dining event for your special day with your important people
      </p>

      <div class="container">
        @for (type of events(); track type.id; let i = $index) {
          <div class="blog" [class.reversing]="i === 1">
            <div class="info">
              <h1>{{ type.Title }}</h1>
              <p>{{ type.text }}</p>
            </div>

            <img [src]="'https://i-step-project.vercel.app/imgs/' + type.id + '.png'" [alt]="type.Title" (error)="handleImgError($event)">
          </div>
        }
      </div>
    </div>
